services:
  database:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: myprojectdb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword

  backend:
    build: ./backend
    command: >
      sh -c "
      sleep 10 &&
      python manage.py migrate &&
      gunicorn backend.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_DB=myprojectdb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_HOST=database
    depends_on:
      - database

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:  